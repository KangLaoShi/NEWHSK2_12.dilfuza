<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK2 Lesson 12 - Lug'at</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-panel {
            background-color: rgba(30, 41, 59, 0.8); /* slate-800/80 */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.5); /* slate-600 */
        }
    </style>
</head>
<body class="min-h-screen bg-slate-900 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-800 to-indigo-950 text-slate-100 font-sans selection:bg-indigo-500/30">

    <!-- Header -->
    <header class="pt-12 pb-8 px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 mb-3 drop-shadow-sm">
            这里比北京冷多了
        </h1>
        <h2 class="text-lg md:text-xl font-medium text-slate-300 bg-slate-800/50 inline-block px-6 py-2 rounded-full border border-slate-700/50 shadow-sm backdrop-blur-sm">
            Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
        </h2>
    </header>

    <!-- Navigation -->
    <div class="max-w-3xl mx-auto px-4 mb-8">
        <div class="flex gap-2 justify-center overflow-x-auto p-2 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl scrollbar-hide">
            <button id="tab-flashcards" onclick="switchTab('flashcards')" class="flex items-center gap-2 px-6 py-3 rounded-xl font-medium text-sm transition-all whitespace-nowrap flex-shrink-0 bg-indigo-600 text-white shadow-lg shadow-indigo-900/50">
                <i class="fa-solid fa-layer-group"></i> Fleshkartalar
            </button>
            <button id="tab-quiz" onclick="switchTab('quiz')" class="flex items-center gap-2 px-6 py-3 rounded-xl font-medium text-sm transition-all whitespace-nowrap flex-shrink-0 text-slate-400 hover:text-white hover:bg-slate-700/50">
                <i class="fa-solid fa-square-check"></i> Lug'at testi
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <main id="app-content" class="max-w-3xl mx-auto px-4 min-h-[50vh]">
        <!-- Content gets injected here by JS -->
    </main>

    <!-- Footer -->
    <footer class="mt-20 py-8 border-t border-slate-800/80 text-center text-slate-500 bg-slate-900/50 backdrop-blur-sm">
        <p class="font-medium text-slate-400 mb-2">HSK 2 NEW3.0 - Lesson 12</p>
        <p class="text-sm">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
    </footer>

    <script>
        // --- DATA ---
        const vocabList = [
            { hanzi: "事情", pinyin: "shìqing", uz: "Narsa, Ish, Voqea", ru: "Дело, Событие", en: "Matter, Affair" },
            { hanzi: "晴", pinyin: "qíng", uz: "Ochiq, Quyoshli", ru: "Ясно, Солнечно", en: "Sunny" },
            { hanzi: "正", pinyin: "zhèng", uz: "Ayni paytda, Hozir", ru: "Как раз, Именно", en: "Happening, Continuing" },
            { hanzi: "外面", pinyin: "wàimiàn", uz: "Tashqari", ru: "Снаружи, На улице", en: "Outside" },
            { hanzi: "阴", pinyin: "yīn", uz: "Bulutli", ru: "Пасмурно", en: "Cloudy" },
            { hanzi: "从小", pinyin: "cóngxiǎo", uz: "Yoshligidan, Bolalikdan", ru: "С детства", en: "Since childhood" },
            { hanzi: "地铁", pinyin: "dìtiě", uz: "Metro", ru: "Метро", en: "Subway" },
            { hanzi: "楼", pinyin: "lóu", uz: "Bino, Qavat", ru: "Здание, Этаж", en: "Building" },
            { hanzi: "站", pinyin: "zhàn", uz: "Bekat, Stansiya", ru: "Остановка, Станция", en: "Stop, Station" },
            { hanzi: "小时候", pinyin: "xiǎoshíhou", uz: "Yoshligida, Bolaligida", ru: "В детстве", en: "Childhood" },
            { hanzi: "好", pinyin: "hǎo", uz: "Juda", ru: "Очень", en: "Very, Quite" },
            { hanzi: "冷", pinyin: "lěng", uz: "Sovuq", ru: "Холодно", en: "Cold" },
            { hanzi: "跑", pinyin: "pǎo", uz: "Yugurmoq", ru: "Бегать", en: "Run" },
            { hanzi: "慢", pinyin: "màn", uz: "Sekin", ru: "Медленно", en: "Slow" },
            { hanzi: "快", pinyin: "kuài", uz: "Tez", ru: "Быстро", en: "Fast" }
        ];

        // --- STATE ---
        let activeTab = 'flashcards';
        
        // Flashcard State
        let currentCardIndex = 0;
        let isCardFlipped = false;

        // Quiz State
        let quizData = [];
        let currentQuizIdx = 0;
        let score = 0;
        let isAnswering = false;
        let showResult = false;
        let selectedOption = null;

        // --- AUDIO HELPER ---
        function playAudio(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- HELPERS ---
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initQuizData() {
            quizData = vocabList.map(v => {
                const wrongOptions = shuffleArray(vocabList.filter(x => x.uz !== v.uz)).slice(0, 3).map(x => x.uz);
                return {
                    q: v.hanzi,
                    options: shuffleArray([v.uz, ...wrongOptions]),
                    ans: v.uz
                };
            });
            quizData = shuffleArray(quizData); // Shuffle the order of questions
        }

        // --- TAB SWITCHING ---
        function switchTab(tabId) {
            activeTab = tabId;
            
            // Update Tab UI
            document.getElementById('tab-flashcards').className = `flex items-center gap-2 px-6 py-3 rounded-xl font-medium text-sm transition-all whitespace-nowrap flex-shrink-0 ${activeTab === 'flashcards' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'}`;
            document.getElementById('tab-quiz').className = `flex items-center gap-2 px-6 py-3 rounded-xl font-medium text-sm transition-all whitespace-nowrap flex-shrink-0 ${activeTab === 'quiz' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'}`;

            // Render Content
            render();
        }

        // --- FLASHCARD LOGIC ---
        function flipCard() {
            isCardFlipped = !isCardFlipped;
            renderFlashcards();
        }

        function nextCard() {
            isCardFlipped = false;
            currentCardIndex = (currentCardIndex + 1) % vocabList.length;
            renderFlashcards();
        }

        function prevCard() {
            isCardFlipped = false;
            currentCardIndex = (currentCardIndex - 1 + vocabList.length) % vocabList.length;
            renderFlashcards();
        }

        function renderFlashcards() {
            const container = document.getElementById('app-content');
            if (activeTab !== 'flashcards') return;

            const current = vocabList[currentCardIndex];
            
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center p-4">
                    <div class="w-full max-w-md h-80 relative perspective-1000 cursor-pointer" onclick="flipCard()">
                        <div class="w-full h-full absolute top-0 left-0 transition-transform duration-500 transform-style-3d ${isCardFlipped ? 'rotate-y-180' : ''}">
                            
                            <!-- Front -->
                            <div class="absolute w-full h-full backface-hidden glass-panel rounded-3xl shadow-2xl flex flex-col items-center justify-center p-6 text-center">
                                <button 
                                    onclick="event.stopPropagation(); playAudio('${current.hanzi}')"
                                    class="absolute top-4 right-4 p-3 bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-300 rounded-full transition-colors focus:outline-none"
                                >
                                    <i class="fa-solid fa-volume-high text-xl"></i>
                                </button>
                                <span class="text-8xl font-medium text-white drop-shadow-md">${current.hanzi}</span>
                            </div>
                            
                            <!-- Back -->
                            <div class="absolute w-full h-full backface-hidden glass-panel rounded-3xl shadow-2xl flex flex-col items-center justify-center p-6 text-center rotate-y-180">
                                <div class="space-y-4 w-full">
                                    <div class="mb-1">
                                        <p class="text-3xl font-medium text-indigo-300 tracking-wider">${current.pinyin}</p>
                                    </div>
                                    <div class="w-16 h-px bg-slate-600 mx-auto"></div>
                                    <div>
                                        <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">O'zbekcha</p>
                                        <p class="text-xl font-semibold text-white">${current.uz}</p>
                                    </div>
                                    <div class="w-16 h-px bg-slate-600 mx-auto"></div>
                                    <div>
                                        <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Русский</p>
                                        <p class="text-xl font-semibold text-white">${current.ru}</p>
                                    </div>
                                    <div class="w-16 h-px bg-slate-600 mx-auto"></div>
                                    <div>
                                        <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">English</p>
                                        <p class="text-xl font-semibold text-white">${current.en}</p>
                                    </div>
                                </div>
                            </div>
                            
                        </div>
                    </div>

                    <!-- Controls -->
                    <div class="flex items-center gap-6 mt-10">
                        <button onclick="prevCard()" class="w-14 h-14 flex items-center justify-center bg-slate-800 hover:bg-slate-700 text-white rounded-full transition shadow-lg border border-slate-700">
                            <i class="fa-solid fa-chevron-left text-xl"></i>
                        </button>
                        <span class="text-slate-300 font-medium text-lg w-16 text-center">
                            ${currentCardIndex + 1} / ${vocabList.length}
                        </span>
                        <button onclick="nextCard()" class="w-14 h-14 flex items-center justify-center bg-slate-800 hover:bg-slate-700 text-white rounded-full transition shadow-lg border border-slate-700">
                            <i class="fa-solid fa-chevron-right text-xl"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // --- QUIZ LOGIC ---
        function selectOption(option) {
            if (isAnswering) return;
            isAnswering = true;
            selectedOption = option;
            
            const q = quizData[currentQuizIdx];
            if (option === q.ans) {
                score++;
            }
            
            renderQuiz();

            setTimeout(() => {
                isAnswering = false;
                selectedOption = null;
                if (currentQuizIdx + 1 < quizData.length) {
                    currentQuizIdx++;
                } else {
                    showResult = true;
                }
                renderQuiz();
            }, 1200);
        }

        function restartQuiz() {
            initQuizData();
            currentQuizIdx = 0;
            score = 0;
            showResult = false;
            selectedOption = null;
            isAnswering = false;
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('app-content');
            if (activeTab !== 'quiz') return;

            if (showResult) {
                container.innerHTML = `
                    <div class="text-center glass-panel p-10 rounded-3xl shadow-xl max-w-md mx-auto mt-10">
                        <h2 class="text-3xl font-bold text-white mb-4">Natija (Result)</h2>
                        <p class="text-7xl font-black text-indigo-400 mb-8">${score} <span class="text-4xl text-slate-400">/ ${quizData.length}</span></p>
                        <button onclick="restartQuiz()" class="flex items-center justify-center gap-2 px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl mx-auto transition-colors font-medium text-lg w-full">
                            <i class="fa-solid fa-rotate-right"></i> Qaytadan (Restart)
                        </button>
                    </div>
                `;
                return;
            }

            const q = quizData[currentQuizIdx];
            
            let optionsHtml = '';
            q.options.forEach(opt => {
                let btnClass = "bg-slate-800/60 hover:bg-slate-700 border-slate-600 text-slate-200 cursor-pointer";
                let iconHtml = "";

                if (selectedOption) {
                    btnClass += " cursor-default"; // disable hover effect visually
                    if (opt === q.ans) {
                        btnClass = "bg-green-600/20 border-green-500 text-green-400 cursor-default";
                        iconHtml = `<i class="fa-solid fa-circle-check text-xl"></i>`;
                    } else if (opt === selectedOption) {
                        btnClass = "bg-red-600/20 border-red-500 text-red-400 cursor-default";
                        iconHtml = `<i class="fa-solid fa-circle-xmark text-xl"></i>`;
                    } else {
                        btnClass = "opacity-50 border-slate-700 text-slate-500 cursor-default";
                    }
                }

                optionsHtml += `
                    <button 
                        ${isAnswering ? 'disabled' : ''} 
                        onclick="selectOption('${opt.replace(/'/g, "\\'")}')" 
                        class="p-6 border-2 rounded-2xl text-xl font-medium transition-all duration-300 ${btnClass} flex justify-between items-center text-left"
                    >
                        <span>${opt}</span>
                        ${iconHtml}
                    </button>
                `;
            });

            container.innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <div class="flex justify-between items-center mb-6 px-4">
                        <span class="text-slate-400 font-medium text-lg">Savol ${currentQuizIdx + 1} / ${quizData.length}</span>
                        <span class="text-indigo-400 font-bold text-lg">Hisob: ${score}</span>
                    </div>
                    
                    <div class="glass-panel p-8 md:p-12 rounded-3xl shadow-xl text-center mb-8 min-h-[16rem] flex flex-col justify-center relative">
                        <button 
                            onclick="playAudio('${q.q}')"
                            class="absolute top-4 right-4 p-3 bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-300 rounded-full transition-colors focus:outline-none"
                        >
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                        <h3 class="text-6xl md:text-8xl font-bold text-white mb-2 leading-tight drop-shadow-md">${q.q}</h3>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }

        // --- MAIN RENDER ---
        function render() {
            if (activeTab === 'flashcards') {
                renderFlashcards();
            } else if (activeTab === 'quiz') {
                renderQuiz();
            }
        }

        // Initialize App
        initQuizData();
        render();

    </script>
</body>
</html>
