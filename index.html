            { q: "你跑步跑___比我快。", options: ["的", "地", "得", "了"], ans: "得" },
            { q: "他踢足球比我踢得___。", options: ["好", "很多", "好了", "得多好"], ans: "好" },
            { q: "外边还___下着雪呢！", options: ["正", "多", "很", "太"], ans: "正" },
            { q: "我___跑，等着你。", options: ["慢慢", "快快", "好好", "冷冷"], ans: "慢慢" },
            { q: "他个子___我高得多。", options: ["比", "得", "和", "跟"], ans: "比" },
            { q: "今天___昨天热多了。", options: ["比", "得", "和", "就"], ans: "比" },
            { q: "姐姐唱歌唱___比我好。", options: ["的", "地", "得", "了"], ans: "得" },
            { q: "这个苹果比那个大___。", options: ["多了", "多", "很", "非常"], ans: "多了" },
            { q: "妹妹___我喜欢吃苹果。", options: ["得", "比", "和", "正"], ans: "比" },
            { q: "汉字他写___比我好看。", options: ["的", "地", "得", "了"], ans: "得" },
            { q: "这里的风景比那里美___。", options: ["得多", "多", "很", "非常"], ans: "得多" }
        ];

        const tabsConfig = [
            { id: 'flashcards', label: "Fleshkartalar", icon: "fa-layer-group" },
            { id: 'vocabQuiz', label: "Lug'at testi", icon: "fa-square-check" },
            { id: 'dialogues', label: "Muloqot", icon: "fa-comments" },
            { id: 'grammar', label: "Grammatika", icon: "fa-book-open" },
            { id: 'grammarQuiz', label: "Grammatika testi", icon: "fa-pen-to-square" },
            { id: 'fillBlanks', label: "So'zlarni to'ldirish", icon: "fa-pen" }
        ];

        // --- STATE ---
        let activeTab = 'flashcards';
        
        let cardIndex = 0;
        let isCardFlipped = false;

        // Quiz State Object
        let quizzes = {
            vocabQuiz: { data: [], currentIdx: 0, score: 0, showResult: false, selected: null, isAnswering: false },
            grammarQuiz: { data: [], currentIdx: 0, score: 0, showResult: false, selected: null, isAnswering: false },
            fillBlanks: { data: [], currentIdx: 0, score: 0, showResult: false, selected: null, isAnswering: false }
        };

        // --- AUDIO HELPER ---
        function playAudio(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- HELPERS ---
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initQuizzes() {
            // Vocab Quiz Data
            quizzes.vocabQuiz.data = vocabList.map(v => {
                const wrongOptions = shuffleArray(vocabList.filter(x => x.uz !== v.uz)).slice(0, 3).map(x => x.uz);
                return { q: v.hanzi, options: shuffleArray([v.uz, ...wrongOptions]), ans: v.uz };
            });
            quizzes.vocabQuiz.data = shuffleArray(quizzes.vocabQuiz.data);

            // Grammar Quiz Data
            quizzes.grammarQuiz.data = shuffleArray(rawGrammarQuiz);

            // Fill in Blanks Data
            quizzes.fillBlanks.data = shuffleArray(rawFillBlanks);
        }

        // --- TAB SWITCHING ---
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = tabsConfig.map(tab => {
                const isActive = activeTab === tab.id;
                const activeClass = isActive 
                    ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50' 
                    : 'text-slate-400 hover:text-white hover:bg-slate-700/50';
                return `
                    <button onclick="switchTab('${tab.id}')" class="flex items-center gap-2 px-5 py-3 rounded-xl font-medium text-sm transition-all whitespace-nowrap flex-shrink-0 ${activeClass}">
                        <i class="fa-solid ${tab.icon}"></i> ${tab.label}
                    </button>
                `;
            }).join('');
        }

        function switchTab(tabId) {
            activeTab = tabId;
            renderTabs();
            renderContent();
        }

        // --- RENDERERS ---
        function renderContent() {
            const container = document.getElementById('app-content');
            container.innerHTML = ''; // clear

            if (activeTab === 'flashcards') {
                renderFlashcards(container);
            } else if (activeTab === 'vocabQuiz' || activeTab === 'grammarQuiz' || activeTab === 'fillBlanks') {
                renderQuiz(container, activeTab);
            } else if (activeTab === 'dialogues') {
                renderDialogues(container);
            } else if (activeTab === 'grammar') {
                renderGrammar(container);
            }
        }

        // 1. Flashcards
        function flipCard() {
            isCardFlipped = !isCardFlipped;
            renderContent();
        }
        function nextCard() {
            isCardFlipped = false;
            cardIndex = (cardIndex + 1) % vocabList.length;
            renderContent();
        }
        function prevCard() {
            isCardFlipped = false;
            cardIndex = (cardIndex - 1 + vocabList.length) % vocabList.length;
            renderContent();
        }
        function renderFlashcards(container) {
            const current = vocabList[cardIndex];
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center p-4">
                    <div class="w-full max-w-md h-80 relative perspective-1000 cursor-pointer" onclick="flipCard()">
                        <div class="w-full h-full absolute top-0 left-0 transition-transform duration-500 transform-style-3d ${isCardFlipped ? 'rotate-y-180' : ''}">
                            <!-- Front -->
                            <div class="absolute w-full h-full backface-hidden glass-panel rounded-3xl shadow-2xl flex flex-col items-center justify-center p-6 text-center">
                                <button onclick="event.stopPropagation(); playAudio('${current.hanzi}')" class="absolute top-4 right-4 p-3 bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-300 rounded-full transition-colors focus:outline-none">
                                    <i class="fa-solid fa-volume-high text-xl"></i>
                                </button>
                                <span class="text-8xl font-medium text-white drop-shadow-md">${current.hanzi}</span>
                            </div>
                            <!-- Back -->
                            <div class="absolute w-full h-full backface-hidden glass-panel rounded-3xl shadow-2xl flex flex-col items-center justify-center p-6 text-center rotate-y-180">
                                <div class="space-y-4 w-full">
                                    <div class="mb-1">
                                        <p class="text-3xl font-medium text-indigo-300 tracking-wider">${current.pinyin}</p>
                                    </div>
                                    <div class="w-16 h-px bg-slate-600 mx-auto"></div>
                                    <div>
                                        <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">O'zbekcha</p>
                                        <p class="text-xl font-semibold text-white">${current.uz}</p>
                                    </div>
                                    <div class="w-16 h-px bg-slate-600 mx-auto"></div>
                                    <div>
                                        <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Русский</p>
                                        <p class="text-xl font-semibold text-white">${current.ru}</p>
                                    </div>
                                    <div class="w-16 h-px bg-slate-600 mx-auto"></div>
                                    <div>
                                        <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">English</p>
                                        <p class="text-xl font-semibold text-white">${current.en}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-6 mt-10">
                        <button onclick="prevCard()" class="w-14 h-14 flex items-center justify-center bg-slate-800 hover:bg-slate-700 text-white rounded-full transition shadow-lg border border-slate-700">
                            <i class="fa-solid fa-chevron-left text-xl"></i>
                        </button>
                        <span class="text-slate-300 font-medium text-lg w-16 text-center">
                            ${cardIndex + 1} / ${vocabList.length}
                        </span>
                        <button onclick="nextCard()" class="w-14 h-14 flex items-center justify-center bg-slate-800 hover:bg-slate-700 text-white rounded-full transition shadow-lg border border-slate-700">
                            <i class="fa-solid fa-chevron-right text-xl"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // 2. Generic Quiz Handler (Vocab, Grammar, Blanks)
        window.selectOption = function(type, option) {
            const state = quizzes[type];
            if (state.isAnswering) return;
            state.isAnswering = true;
            state.selected = option;
            
            const q = state.data[state.currentIdx];
            if (option === q.ans) {
                state.score++;
            }
            
            renderContent(); // re-render to show correct/incorrect colors

            setTimeout(() => {
                state.isAnswering = false;
                state.selected = null;
                if (state.currentIdx + 1 < state.data.length) {
                    state.currentIdx++;
                } else {
                    state.showResult = true;
                }
                renderContent();
            }, 1200);
        };

        window.restartQuiz = function(type) {
            initQuizzes(); // re-shuffle
            quizzes[type].currentIdx = 0;
            quizzes[type].score = 0;
            quizzes[type].showResult = false;
            quizzes[type].selected = null;
            quizzes[type].isAnswering = false;
            renderContent();
        };

        function renderQuiz(container, type) {
            const state = quizzes[type];

            if (state.showResult) {
                container.innerHTML = `
                    <div class="text-center glass-panel p-10 rounded-3xl shadow-xl max-w-md mx-auto mt-10">
                        <h2 class="text-3xl font-bold text-white mb-4">Natija (Result)</h2>
                        <p class="text-7xl font-black text-indigo-400 mb-8">${state.score} <span class="text-4xl text-slate-400">/ ${state.data.length}</span></p>
                        <button onclick="restartQuiz('${type}')" class="flex items-center justify-center gap-2 px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl mx-auto transition-colors font-medium text-lg w-full">
                            <i class="fa-solid fa-rotate-right"></i> Qaytadan (Restart)
                        </button>
                    </div>
                `;
                return;
            }

            const q = state.data[state.currentIdx];
            
            let optionsHtml = '';
            q.options.forEach(opt => {
                let btnClass = "bg-slate-800/60 hover:bg-slate-700 border-slate-600 text-slate-200 cursor-pointer";
                let iconHtml = "";

                if (state.selected) {
                    btnClass += " cursor-default";
                    if (opt === q.ans) {
                        btnClass = "bg-green-600/20 border-green-500 text-green-400 cursor-default";
                        iconHtml = `<i class="fa-solid fa-circle-check text-xl"></i>`;
                    } else if (opt === state.selected) {
                        btnClass = "bg-red-600/20 border-red-500 text-red-400 cursor-default";
                        iconHtml = `<i class="fa-solid fa-circle-xmark text-xl"></i>`;
                    } else {
                        btnClass = "opacity-50 border-slate-700 text-slate-500 cursor-default";
                    }
                }

                optionsHtml += `
                    <button 
                        ${state.isAnswering ? 'disabled' : ''} 
                        onclick="selectOption('${type}', '${opt.replace(/'/g, "\\'")}')" 
                        class="p-6 border-2 rounded-2xl text-xl font-medium transition-all duration-300 ${btnClass} flex justify-between items-center text-left"
                    >
                        <span>${opt}</span>
                        ${iconHtml}
                    </button>
                `;
            });

            const showAudioBtn = type === 'vocabQuiz'; // Only show main audio on vocab

            container.innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <div class="flex justify-between items-center mb-6 px-4">
                        <span class="text-slate-400 font-medium text-lg">Savol ${state.currentIdx + 1} / ${state.data.length}</span>
                        <span class="text-indigo-400 font-bold text-lg">Hisob: ${state.score}</span>
                    </div>
                    
                    <div class="glass-panel p-8 md:p-12 rounded-3xl shadow-xl text-center mb-8 min-h-[16rem] flex flex-col justify-center relative">
                        ${showAudioBtn ? `
                        <button onclick="playAudio('${q.q}')" class="absolute top-4 right-4 p-3 bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-300 rounded-full transition-colors focus:outline-none">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>` : ''}
                        <h3 class="text-5xl md:text-6xl font-bold text-white mb-2 leading-tight drop-shadow-md">${q.q}</h3>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }

        // 3. Dialogues
        function renderDialogues(container) {
            let html = '<div class="space-y-12 max-w-4xl mx-auto pb-10">';
            
            dialogues.forEach(dialogue => {
                html += `
                    <div class="glass-panel rounded-3xl overflow-hidden shadow-xl border-t-0">
                        <div class="bg-indigo-900/50 px-6 py-4 border-b border-slate-700">
                            <h3 class="text-xl font-bold text-white">${dialogue.title}</h3>
                        </div>
                        <div class="p-6 space-y-6">
                `;
                
                dialogue.lines.forEach(line => {
                    html += `
                        <div class="flex gap-4 p-4 rounded-2xl hover:bg-slate-700/30 transition-colors">
                            <button onclick="playAudio('${line.hanzi.replace(/'/g, "\\'")}')" class="mt-1 flex-shrink-0 w-10 h-10 bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-300 rounded-full flex items-center justify-center transition-colors focus:outline-none">
                                <i class="fa-solid fa-volume-high"></i>
                            </button>
                            <div>
                                <div class="mb-2">
                                    <span class="inline-block px-2 py-1 bg-slate-700 rounded-md text-xs font-bold text-indigo-300 mr-3 mb-2">${line.speaker}</span>
                                    <p class="text-2xl font-medium text-white mb-1">${line.hanzi}</p>
                                    <p class="text-indigo-200 text-lg">${line.pinyin}</p>
                                </div>
                                <div class="space-y-1 border-l-2 border-slate-600 pl-3 mt-3">
                                    <p class="text-sm text-slate-300"><span class="text-slate-500 mr-2 font-mono text-xs">UZ</span> ${line.uz}</p>
                                    <p class="text-sm text-slate-300"><span class="text-slate-500 mr-2 font-mono text-xs">RU</span> ${line.ru}</p>
                                    <p class="text-sm text-slate-300"><span class="text-slate-500 mr-2 font-mono text-xs">EN</span> ${line.en}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // 4. Grammar
        function renderGrammar(container) {
            let html = '<div class="space-y-8 max-w-4xl mx-auto pb-10">';
            
            grammarList.forEach(item => {
                html += `
                    <div class="glass-panel rounded-3xl p-8 shadow-xl">
                        <h3 class="text-2xl font-bold text-white mb-4">${item.title_zh}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                                <p class="text-xs text-indigo-400 uppercase tracking-wider mb-2 font-bold">O'zbekcha</p>
                                <p class="text-slate-300 text-sm leading-relaxed">${item.desc_uz}</p>
                            </div>
                            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                                <p class="text-xs text-indigo-400 uppercase tracking-wider mb-2 font-bold">Русский</p>
                                <p class="text-slate-300 text-sm leading-relaxed">${item.desc_ru}</p>
                            </div>
                            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                                <p class="text-xs text-indigo-400 uppercase tracking-wider mb-2 font-bold">English</p>
                                <p class="text-slate-300 text-sm leading-relaxed">${item.desc_en}</p>
                            </div>
                        </div>
                        <div class="bg-indigo-950/30 rounded-2xl p-6 border border-indigo-900/50">
                            <h4 class="text-indigo-300 font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-book-open"></i> Misollar (Examples):</h4>
                            <div class="space-y-4">
                `;
                
                item.examples.forEach(ex => {
                    html += `
                        <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-6 pb-4 border-b border-indigo-900/30 last:border-0 last:pb-0">
                            <div class="flex-1">
                                <p class="text-xl text-white font-medium mb-1">${ex.zh}</p>
                                <p class="text-indigo-200">${ex.py}</p>
                            </div>
                            <div class="flex-1 text-slate-400 italic">
                                "${ex.uz}"
                            </div>
                            <button onclick="playAudio('${ex.zh.replace(/'/g, "\\'")}')" class="self-start md:self-center p-2 bg-indigo-500/10 hover:bg-indigo-500/30 text-indigo-400 rounded-full transition-colors focus:outline-none">
                                <i class="fa-solid fa-volume-high text-lg"></i>
                            </button>
                        </div>
                    `;
                });

                html += `</div></div></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // --- INIT ---
        initQuizzes();
        renderTabs();
        renderContent();

    </script>
</body>
</html>
